name: Build and push Docker image

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Production serving image (nginx + node) ─────────────────────────────
      - uses: docker/metadata-action@v5
        id: meta-serving
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta-serving.outputs.tags }}
          labels: ${{ steps.meta-serving.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=serving
          cache-to: type=gha,mode=max,scope=serving

      # ── Source template image (source + node_modules for AI Worker) ─────────
      - uses: docker/metadata-action@v5
        id: meta-source
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=source
            type=sha,suffix=-source

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.source
          push: true
          tags: ${{ steps.meta-source.outputs.tags }}
          labels: ${{ steps.meta-source.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=source
          cache-to: type=gha,mode=max,scope=source
